<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> m-Tiny Game</title>
  <!-- Edited by: boshra suliman -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>m-Tiny Game</h1>

    <section class="carousel-card">
      <button id="leftBtn" class="arrow">→</button>
      <div class="card">
        <img id="carouselImg" src="" alt="صورة تعبيرية" />
        <h2 id="carouselLabel">سعيد</h2>
      </div>
      <button id="rightBtn" class="arrow">←</button>
    </section>

    <section class="rules">
      <h2>القواعد</h2>
      <ul>
        <li>انقر على الاسهم للتنقل بين الصور التي تمثل مجموعة من  المشاعر</li>
        <li>احفظ الشعور المناسب مع الصورة المناسبة قبل البدء باللعب</li>
        <li>تحتوي هذه اللعبة على 3 مراحل</li>
        <li>عند اجتيار جميع المراحل ستحصل على جائزة</li>
      </ul>
    </section>

    <button id="startBtn" class="start">ابدأ اللعبة</button>
  </main>

  <footer style="text-align:center; padding:10px; font-size:14px; color:#888;">Developed by: Boshra Suliman</footer>
  <script src="script.js"></script>
</body>
</html>
